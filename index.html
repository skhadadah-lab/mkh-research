<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#127884">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>MKH Research Console</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<script>if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}</script>
<style>
  :root{
    --paper:#F2F5F7; --panel:#FFFFFF; --ink:#14212D; --muted:#5A6976;
    --line:#E1E6EB; --line2:#EDF0F3; --accent:#127884; --accent-soft:#E4F1F2;
    --today:#E5533C; --warn:#B5551F; --warn-soft:#FBEDE1; --band:#F8FAFB;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Roboto Mono",monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  h1,h2,h3{margin:0;font-weight:600;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer}
  .mono{font-family:var(--mono)}
  header.top{position:sticky;top:0;z-index:30;background:rgba(242,245,247,.93);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:13px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;line-height:1.1}
  .brand .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}
  .brand h1{font-size:19px}
  .spacer{flex:1}
  .pill{border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:6px 12px;font-size:12.5px;display:inline-flex;align-items:center;gap:7px;color:var(--muted)}
  .pill.warn{background:var(--warn-soft);border-color:#EAD3BC;color:var(--warn)}
  .pill.ok{color:var(--accent);background:var(--accent-soft);border-color:#CFE6E7}
  select,input[type=text],input[type=date],input[type=time],input[type=number]{font-family:inherit;font-size:13px;color:var(--ink);background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 9px;outline:none}
  input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .btn{border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:8px 13px;font-size:13px;color:var(--ink);font-weight:500;transition:.12s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:#0e646e;color:#fff}
  .btn.sm{padding:5px 9px;font-size:12px}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
  .btn.ghost:hover{color:var(--ink)}
  main{padding:22px;max-width:1520px;margin:0 auto}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px}
  .panel-h{padding:14px 18px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .panel-h h2{font-size:14.5px}
  .panel-h .sub{font-size:12px;color:var(--muted)}
  .btn:disabled{opacity:.45;cursor:not-allowed;border-color:var(--line);color:var(--muted);background:var(--panel)}
  input:disabled,select:disabled{opacity:.6;cursor:not-allowed;background:#F6F8F9}
  .dropzone.locked{opacity:.4;pointer-events:none}
  .wd-in{font-family:var(--mono);font-size:10.5px;color:var(--accent);margin-left:6px;font-weight:600}
  .dropzone{border:2px dashed var(--line);border-radius:10px;padding:16px;text-align:center;font-size:12.5px;color:var(--muted);transition:.15s;cursor:pointer}
  .dropzone:hover,.dropzone.over{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
  .dropzone b{color:var(--ink)}
  #ganttWrap{overflow-x:auto;padding-bottom:4px}
  .gantt{position:relative;min-height:150px}
  .bar .asg{position:absolute;right:9px;top:50%;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:currentColor;box-shadow:0 0 0 2px #fff;pointer-events:none}
  .bar .cap{position:absolute;top:-2px;bottom:-2px;width:6px;border:2.5px solid currentColor;pointer-events:none;box-sizing:border-box;z-index:2}
  .bar .cap.l{left:-1px;border-right:none;border-radius:5px 0 0 5px}
  .bar .cap.r{right:-1px;border-left:none;border-radius:0 5px 5px 0}
  .bands{position:absolute;top:0;bottom:0;z-index:0;pointer-events:none}
  .band{position:absolute;top:0;bottom:0}
  .wk{position:absolute;top:0;bottom:0;width:1px;background:var(--line2);z-index:0}
  .axis{position:relative;height:42px;border-bottom:1px solid var(--line);z-index:2}
  .axis .mo{position:absolute;top:8px;font-family:var(--mono);font-size:12.5px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--ink);padding-left:8px}
  .axis .wd{position:absolute;top:26px;font-family:var(--mono);font-size:9px;color:var(--muted);padding-left:2px}
  .lane{position:relative;border-bottom:1px solid var(--line2);z-index:1}
  .lane:hover{background:rgba(18,120,132,.035)}
  .lane.sel{background:var(--accent-soft)}
  .lane-label{position:absolute;left:0;top:0;height:100%;display:flex;align-items:center;gap:9px;padding:0 12px;border-right:1px solid var(--line);background:var(--panel);z-index:4;cursor:pointer}
  .lane.sel .lane-label{background:var(--accent-soft)}
  .lane-label .swatch{width:12px;height:12px;border-radius:3px;flex:none;box-shadow:0 0 0 2px #fff,0 0 0 3px rgba(0,0,0,.05)}
  .lane-label .nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;max-width:100%}
  .lane-label .meta{font-family:var(--mono);font-size:9.5px;color:var(--muted)}
  .plabel{position:absolute;left:0;top:0;height:100%;display:flex;align-items:center;padding:0 12px;border-right:1px solid var(--line);background:var(--panel);z-index:4;font-size:12px;gap:7px}
  .plabel .ty{font-family:var(--mono);font-size:8.5px;padding:1px 4px;border-radius:4px;font-weight:700;flex:none}
  .track{position:absolute;top:0;height:100%}
  .rail{position:absolute;height:3px;border-radius:3px;z-index:2}
  .bar{position:absolute;border-radius:7px;display:flex;align-items:center;padding:0 8px;overflow:hidden;cursor:grab;z-index:1;box-shadow:inset 0 1px 0 rgba(255,255,255,.4),0 1px 2px rgba(0,0,0,.05)}
  .bar:hover{box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 2px 7px rgba(0,0,0,.16)}
  .bar.dragging{cursor:grabbing;opacity:.92;z-index:20}
  .bar .lbl{font-size:10.5px;font-weight:600;white-space:nowrap;text-overflow:ellipsis;overflow:hidden;pointer-events:none}
  .bar .grip{position:absolute;top:0;bottom:0;width:9px;cursor:col-resize;opacity:0}
  .bar:hover .grip{opacity:1;background:rgba(255,255,255,.4)}
  .bar .grip.l{left:0;border-radius:7px 0 0 7px}
  .bar .grip.r{right:0;border-radius:0 7px 7px 0}
  .pin{position:absolute;z-index:5;cursor:grab;transform:translateX(-50%)}
  .pin.dragging{cursor:grabbing;z-index:20}
  .pin .dot{width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.3);margin:0 auto;pointer-events:none}
  .pin .stem{width:2px;margin:0 auto;background:currentColor;opacity:.5}
  .pin.collide .dot{box-shadow:0 0 0 2px var(--warn),0 1px 4px rgba(0,0,0,.28)}
  .flag{position:absolute;z-index:5;cursor:grab;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center}
  .flag.dragging{cursor:grabbing;z-index:20}
  .flag .tri{width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;filter:drop-shadow(0 0 1.4px #fff) drop-shadow(0 1px 1px rgba(0,0,0,.2));pointer-events:none}
  .flag .stem{width:2px;background:currentColor;opacity:.5}
  #dragLbl{position:fixed;z-index:65;background:var(--ink);color:#fff;font-family:var(--mono);font-size:11px;padding:5px 9px;border-radius:7px;pointer-events:none;opacity:0;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.3)}
  #dragLbl.show{opacity:1}
  #eventPop{position:fixed;z-index:66;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 16px 44px rgba(0,0,0,.25);width:280px;display:none;overflow:hidden}
  #eventPop.show{display:block}
  #eventPop .eh{padding:11px 13px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:8px}
  #eventPop .eh .sw{width:10px;height:10px;border-radius:3px;flex:none}
  #eventPop .eh .ty{font-family:var(--mono);font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;padding:1px 6px;border-radius:5px;font-weight:700}
  #eventPop .eb{padding:12px 13px}
  #eventPop .eb label{display:block;font-size:10.5px;color:var(--muted);margin:0 0 4px;font-weight:600}
  #eventPop .eb .fld{margin-bottom:10px}
  #eventPop .eb input{width:100%}
  #eventPop .ef{padding:9px 13px;border-top:1px solid var(--line2);display:flex;justify-content:space-between;align-items:center;gap:8px}
  .today{position:absolute;top:0;bottom:0;width:2px;background:var(--today);z-index:6;pointer-events:none}
  .today .cap{position:absolute;top:2px;left:3px;font-family:var(--mono);font-size:9px;color:#fff;background:var(--today);padding:1px 5px;border-radius:4px;letter-spacing:.05em;white-space:nowrap}
  .legend{display:flex;gap:16px;flex-wrap:wrap;padding:10px 18px;font-size:11.5px;color:var(--muted);border-top:1px solid var(--line2)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .lg-bar{width:16px;height:10px;border-radius:3px;background:#9AA7B2}
  .lg-mtg{width:12px;height:12px;border-radius:50%;background:#9AA7B2;border:2px solid #fff;box-shadow:0 0 0 1px var(--line)}
  .lg-ddl{width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:10px solid #9AA7B2}
  #tip{position:fixed;z-index:60;background:var(--ink);color:#fff;font-size:12px;padding:8px 11px;border-radius:8px;pointer-events:none;opacity:0;transition:opacity .12s;max-width:250px;box-shadow:0 6px 20px rgba(0,0,0,.3);line-height:1.4}
  #tip .tt{font-family:var(--mono);font-size:10px;color:#9FE0E6;letter-spacing:.05em;text-transform:uppercase}
  .up-row{display:flex;align-items:center;gap:12px;padding:9px 18px;border-bottom:1px solid var(--line2);font-size:13px}
  .up-row:last-child{border-bottom:none}
  .up-row:hover{background:#FAFBFC;cursor:pointer}
  .up-when{font-family:var(--mono);font-size:11.5px;color:var(--muted);width:88px;flex:none}
  .up-when b{color:var(--ink);font-weight:600}
  .up-dot{width:9px;height:9px;border-radius:2px;flex:none}
  .up-tag{font-family:var(--mono);font-size:9.5px;color:var(--muted);flex:none}
  .up-type{font-family:var(--mono);font-size:8.5px;letter-spacing:.05em;text-transform:uppercase;padding:1px 6px;border-radius:5px;font-weight:700;flex:none}
  .up-lbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .up-soon{color:var(--today);font-weight:600}
  .grid{display:grid;grid-template-columns:1.2fr .8fr;gap:22px;margin-top:22px}
  @media(max-width:980px){.grid{grid-template-columns:1fr}header.top{padding:12px 16px}main{padding:16px}}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:9px 10px;border-bottom:1px solid var(--line)}
  td{padding:7px 10px;border-bottom:1px solid var(--line2);vertical-align:middle}
  .cellbtns{display:flex;gap:8px;align-items:center}
  .btn.sm.ic{padding:5px 8px}
  td.rmcol{border-left:1px solid var(--line2);padding-left:16px;text-align:center}
  th:last-child{padding-left:16px;border-left:1px solid var(--line)}
  tr:last-child td{border-bottom:none}
  .type-tag{font-family:var(--mono);font-size:9px;letter-spacing:.05em;text-transform:uppercase;padding:2px 6px;border-radius:5px;font-weight:700}
  .tt-meeting{background:#E5EEF7;color:#2F6DB5}
  .tt-task{background:#EAF0F1;color:#5C6B7A}
  .tt-concept{background:#DBF1F3;color:#0B7982}
  .tt-data{background:#F6E9D2;color:#9A6410}
  .tt-manuscript{background:#E9E5FB;color:#5A46C7}
  .libwrap{border:1px solid var(--line2);border-radius:12px;padding:12px 14px;margin-bottom:14px;background:var(--panel)}
  .detailrow{display:grid;grid-template-columns:288px 1fr;gap:22px;margin-top:22px;align-items:start}
  .projblock{margin-bottom:22px}
  .projblock .detailrow{margin-top:0}
  .projbar{display:flex;align-items:center;gap:12px;padding:12px 16px;margin-bottom:12px;cursor:pointer;transition:.12s}
  .projbar:hover{border-color:var(--accent)}
  .projbar.sel{box-shadow:0 0 0 2px var(--accent) inset}
  .projbar.locked{background:linear-gradient(180deg,#FCFBF8,#F7F5F0)}
  .projbar .swatch{width:12px;height:12px;border-radius:4px;flex:none}
  .projbar .pbmeta{display:flex;flex-direction:column;min-width:0}
  .projbar .pbname{font-weight:650;font-size:14px}
  .projbar .pbsub{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .up-who{margin-left:8px;font-size:11px;color:var(--accent);font-weight:600;white-space:nowrap}
  .gcalrow{display:flex;gap:8px;align-items:center}
  .gcalrow select{flex:1;min-width:0}
  .share-row{display:flex;gap:10px;align-items:center;padding:5px 0;font-size:12.5px}
  .share-row span:first-child{flex:1;overflow:hidden;text-overflow:ellipsis}
  .share-add{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .share-add input{flex:1;min-width:150px}
  .up-filters{display:flex;flex-wrap:wrap;gap:8px;padding:12px 14px;border-bottom:1px solid var(--line)}
  .up-filters select{font-size:12px;padding:5px 8px;border:1px solid var(--line2);border-radius:7px;background:var(--panel);color:var(--ink)}
  @media(max-width:980px){.detailrow{grid-template-columns:1fr}}
  .libpanel{position:sticky;top:12px}
  #libraryWrap{padding:12px 14px;max-height:70vh;overflow-y:auto}
  .libintro{font-size:11.5px;color:var(--muted);margin-bottom:10px}
  .libsec{margin-bottom:10px}
  .libsec .libtag{display:inline-block;margin-bottom:6px}
  .libchips{display:flex;flex-wrap:wrap;gap:6px}
  .libwrap h4{margin:0 0 3px;font-size:12.5px}
  .libgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:8px}
  @media(max-width:720px){.libgrid{grid-template-columns:1fr}}
  .libcol{border:1px solid var(--line2);border-radius:9px;overflow:hidden;margin-bottom:10px}
  .libcol .lh{padding:6px 9px;font-size:11px;font-weight:700;letter-spacing:.02em;color:#fff}
  .libcol .lb{padding:7px;display:flex;flex-direction:column;gap:5px}
  .chip{text-align:left;font-size:11.5px;line-height:1.25;padding:6px 8px;border:1px solid var(--line);border-radius:7px;background:var(--panel);cursor:pointer;color:var(--ink);transition:.12s}
  .chip:hover:not(:disabled){border-color:var(--accent);background:var(--line2)}
  .chip:disabled{opacity:.45;cursor:not-allowed}
  .chip .d{color:var(--muted);font-size:10px}
  .chip.mini{font-size:11px;padding:5px 9px}
  .librow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:8px}
  .libtag{font-size:10px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:#fff;padding:3px 9px;border-radius:6px;flex:none}
  .needbadge{display:inline-block;margin-left:7px;font-size:9.5px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:#B26A00;background:#FFE9C7;border:1px solid #F0C98A;padding:1px 6px;border-radius:5px;vertical-align:middle}
  tr.needsfill{background:#FFF7E9}
  tr.needsfill td:first-child{box-shadow:inset 3px 0 0 #E8973A}
  .bar.needsfill,.pin.needsfill .dot,.flag.needsfill .tri{animation:needpulse 1.3s ease-in-out infinite}
  .bar.needsfill{outline:2px dashed #E8973A;outline-offset:1px}
  .pin.needsfill .dot{box-shadow:0 0 0 3px #E8973A,0 1px 5px rgba(0,0,0,.3)}
  @keyframes needpulse{0%,100%{filter:none}50%{filter:brightness(1.12) drop-shadow(0 0 3px #E8973A)}}
  .tt-deadline{background:var(--warn-soft);color:var(--warn)}
  td input[type=date],td input[type=time]{padding:4px 6px;font-size:12px}
  td input[type=time]{width:82px}
  td input[type=text]{width:100%;padding:4px 6px;font-size:12.5px;border-color:transparent;background:transparent}
  td input[type=text]:hover{border-color:var(--line)}
  .rowoff{opacity:.38}
  .chk{width:16px;height:16px;accent-color:var(--accent)}
  .addrow{display:flex;gap:8px;padding:10px 12px;flex-wrap:wrap}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px;font-weight:600}
  .field input,.field select{width:100%}
  .row2{display:flex;gap:10px}.row2>*{flex:1}
  .roster-row{display:flex;gap:8px;margin-bottom:7px;align-items:center}
  .chkrow{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:6px;font-size:12.5px;cursor:pointer}
  .chkrow:hover{background:var(--line2)}
  .chkrow input{flex:none;width:auto}
  .roster-row input{flex:1}
  .exp{display:flex;flex-wrap:wrap;gap:9px;margin-top:6px}
  .note{font-size:12px;color:var(--muted);background:var(--accent-soft);border:1px solid #CFE6E7;border-radius:10px;padding:11px 13px;margin-top:14px;line-height:1.5}
  .overlay{position:fixed;inset:0;background:rgba(20,33,45,.44);z-index:50;display:none;align-items:flex-start;justify-content:center;padding:38px 16px;overflow:auto}
  .overlay.show{display:flex}
  .modal{background:var(--panel);border-radius:16px;width:min(720px,100%);box-shadow:0 24px 60px rgba(0,0,0,.3)}
  .modal-h{padding:18px 22px;border-bottom:1px solid var(--line2)}
  .modal-h h2{font-size:16px}
  .modal-b{padding:18px 22px}
  .modal-f{padding:14px 22px;border-top:1px solid var(--line2);display:flex;justify-content:flex-end;gap:10px}
  .msec{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin:18px 0 8px}
  .mitem{display:grid;grid-template-columns:22px 1fr 130px 92px;gap:8px;align-items:center;padding:5px 0}
  .mitem input[type=text]{width:100%}
  @media(max-width:560px){.mitem{grid-template-columns:22px 1fr;gap:6px}.mitem .md,.mitem .mt{grid-column:2}}
  /* assistant drawer */
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(440px,100%);background:var(--panel);z-index:55;box-shadow:-12px 0 40px rgba(0,0,0,.18);transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column}
  .drawer.show{transform:translateX(0)}
  .drawer-h{padding:16px 18px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:10px}
  .drawer-h h2{font-size:15px}
  .drawer-h .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent)}
  .chatlog{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:88%;padding:10px 13px;border-radius:12px;font-size:13.5px;line-height:1.5;white-space:pre-wrap}
  .msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
  .msg.bot{align-self:flex-start;background:#F0F3F5;color:var(--ink);border-bottom-left-radius:4px}
  .msg.sys{align-self:center;color:var(--muted);font-size:12px;background:transparent;text-align:center}
  .typing{align-self:flex-start;color:var(--muted);font-size:12px;font-style:italic}
  .plancard{align-self:stretch;border:1px solid var(--accent);border-radius:12px;overflow:hidden}
  .plancard .ph{background:var(--accent-soft);padding:10px 13px;font-size:12.5px}
  .plancard .ph b{color:var(--accent)}
  .plancard .pb{padding:10px 13px;font-size:12px;max-height:200px;overflow-y:auto}
  .plancard .pline{display:flex;gap:8px;padding:3px 0;border-bottom:1px solid var(--line2)}
  .plancard .pline:last-child{border-bottom:none}
  .plancard .pd{font-family:var(--mono);font-size:11px;color:var(--muted);flex:none;width:118px}

const pad=n=>String(n).padStart(2,'0');
const parse=iso=>{const[y,m,d]=iso.split('-').map(Number);return Date.UTC(y,m-1,d)};
const toIso=ts=>{const d=new Date(ts);return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`};
const addDays=(iso,n)=>toIso(parse(iso)+n*864e5);
const daysBetween=(a,b)=>Math.round((parse(b)-parse(a))/864e5);
const basic=iso=>iso.replace(/-/g,'');
const dow=iso=>new Date(parse(iso)).getUTCDay();
const snapDow=(iso,t)=>{let d=iso,g=0;while(dow(d)!==t&&g<7){d=addDays(d,1);g++}return d};
const snapBack=(iso,t)=>{let d=iso,g=0;while(dow(d)!==t&&g<7){d=addDays(d,-1);g++}return d};
const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOWN=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const fmt=iso=>{const[y,m,d]=iso.split('-');return `${+d} ${MON[+m-1]}`};
const fmtFull=iso=>`${DOWN[dow(iso)]} ${fmt(iso)}`;
const todayIso=()=>{const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`};

/* auto-fit a schedule between start (primary meeting) and submission (final) */
function autoSchedule(cfg){
  const S=cfg.start, E=cfg.submission, dw=cfg.meetDow, mt=cfg.meetTime, dt=cfg.ddlTime;
  const A = cfg.acqMode==='none' ? addDays(S,3) : cfg.acqEnd;      // acquisition end
  const Smtg=snapDow(S,dw);
  let statsPlan=snapDow(addDays(A,13),dw);                          // data-lock / QC
  let statAnalysis=snapBack(addDays(E,-50),dw);                     // begin analysis
  let results=snapBack(addDays(E,-38),dw);                          // results review
  let presub=snapBack(addDays(E,-7),dw);                            // pre-submission
  // enforce chronological order (tight windows can otherwise reorder these)
  const seq=[Smtg,statsPlan,statAnalysis,results,presub];
  for(let i=1;i<seq.length;i++){ if(parse(seq[i])<parse(addDays(seq[i-1],1))) seq[i]=snapDow(addDays(seq[i-1],7),dw); }
  statsPlan=seq[1]; statAnalysis=seq[2]; results=seq[3]; presub=seq[4];
  const cl=(s,e)=>parse(e)<parse(s)?s:e;
  const M=(k,l,d,x)=>({key:k,label:l,date:d,time:mt,include:true,desc:x});
  const D=(k,l,d,x)=>({key:k,label:l,date:d,time:dt,include:true,desc:x});
  const T=(k,l,s,e,tt,x)=>({key:k,label:l,start:s,end:cl(s,e),include:true,desc:x||'',ttype:tt||'concept',att:[]});

  const meetings=[
    M('primary','Primary project meeting',Smtg,'Kickoff. Approve protocol, authorize ethics submission.'),
    M('statsplan','Statistics plan meeting',statsPlan,'Data-lock + agree pre-specified analysis plan.'),
    M('statsanalysis','Statistical analysis meeting',statAnalysis,'Confirm ethics approval, begin analysis.'),
    M('results','Results review meeting',results,'Agree tables/figures & headline findings.'),
    M('presubmit','Pre-submission sign-off',presub,'Final read, authorship, cover letter + checklist.'),
  ];
  const deadlines=[ D('ethics','Ethics submission deadline',addDays(S,5),'Submit ethics application (expedited/minimal-risk).') ];
  if(cfg.acqMode==='recruitment') deadlines.push(D('recruit','Recruitment deadline',A,'Target recruitment complete.'));
  if(cfg.acqMode!=='none') deadlines.push(D('data','Data collection deadline',A,'All variables collected.'));
  deadlines.push(D('analysis','Analysis deadline',addDays(E,-38),'Analysis outputs finalised.'));
  deadlines.push(D('draft','Manuscript draft deadline',addDays(E,-22),'First full draft ready for review.'));
  deadlines.push(D('submission','Submission deadline',E,'Target journal submission.'));

  const tasks=[ T('protocol','Protocol + STROBE plan + data dictionary',addDays(S,-6),S,'concept') ];
  if(cfg.acqMode==='recruitment') tasks.push(T('recruitment','Recruitment & data collection',addDays(S,1),A,'data'));
  else if(cfg.acqMode==='data') tasks.push(T('datacoll','Data collection & completion',addDays(S,1),A,'data'));
  tasks.push(T('cleaning','Data cleaning, QC & dataset lock',addDays(A,1),addDays(A,12),'data'));
  tasks.push(T('ethicswait','Ethics review period (awaiting approval)',addDays(A,13),addDays(statAnalysis,-1),'concept'));
  tasks.push(T('intromethods','Draft Intro & Methods',addDays(A,13),addDays(A,27),'manuscript'));
  tasks.push(T('analysisphase','Statistical analysis',statAnalysis,addDays(results,-1),'data'));
  tasks.push(T('resultsdraft','Draft Results + Discussion',results,addDays(E,-23),'manuscript'));
  tasks.push(T('revision','Manuscript revision',addDays(E,-21),addDays(presub,-1),'manuscript'));
  tasks.push(T('buffer','Final revision + submission prep',addDays(presub,1),addDays(E,-1),'manuscript'));
  return {meetings,deadlines,tasks};
}

// place a new task by anchor + type, cascading after existing same-type tasks
function placeTask(p,ttype,days){
  const base={concept:0,data:35,manuscript:80}[ttype]||0;
  const same=(p.tasks||[]).filter(t=>t.ttype===ttype);
  let start;
  if(same.length){ const lastEnd=same.reduce((m,t)=>parse(t.end)>parse(m)?t.end:m,same[0].end); start=addDays(lastEnd,1); }
  else start=addDays(p.anchor,base);
  return {start,end:addDays(start,Math.max(days-1,0))};
}
function placeMeeting(p){
  const n=(p.meetings||[]).length;
  return snapDow(addDays(p.anchor, n*14), p.meetDow);
}
function placeDeadline(p){

}

function itemsOf(p){
  const out=[];
  (p.meetings||[]).forEach(m=>out.push({...m,type:'meeting'}));
  (p.deadlines||[]).forEach(m=>out.push({...m,type:'deadline'}));
  (p.tasks||[]).forEach(t=>out.push({...t,type:'task'}));
  return out;
}
const itemStart=it=>it.type==='task'?it.start:it.date;
const itemEnd=it=>it.type==='task'?it.end:it.date;

  try{ if(window.storage&&window.storage.set) await window.storage.set('portfolio_v2',data,false); }catch(e){}

const el=id=>document.getElementById(id);
const hex2rgba=(h,a)=>{const n=parseInt(h.slice(1),16);return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`};
function visibleProjects(){return viewFilter==='all'?PROJECTS:PROJECTS.filter(p=>p.id===viewFilter)}
const laneLabelW=()=>window.innerWidth<620?120:200;

function bounds(){
  let min=null,max=null;
  visibleProjects().forEach(p=>itemsOf(p).forEach(it=>{
    if(!it.include)return;
    const s=itemStart(it),e=itemEnd(it);
    if(min===null||parse(s)<parse(min))min=s;
    if(max===null||parse(e)>parse(max))max=e;
  }));
  if(!min){min=todayIso();max=addDays(min,30);}
  return {min:addDays(min,-6),max:addDays(max,6)};
}
function collisionMap(){
  const clash={};
  PROJECTS.forEach(p=>(p.meetings||[]).forEach(m=>{if(!m.include)return;const k=m.date+'|'+m.time;(clash[k]=clash[k]||[]).push(p.tag)}));
  return clash;
}

function renderGantt(){
  const g=el('gantt'), {min,max}=bounds();
  const total=daysBetween(min,max)+1, trackW=total*DAYW, LW=laneLabelW();
  el('rangeLbl').textContent=`${fmt(min)} – ${fmt(max)} 2026 · ${total} days`;
  el('zoomLbl').textContent=DAYW+'px/day';
  const detailed=viewFilter!=='all';
  const clash=collisionMap();

  let bands='<div class="bands" style="left:'+LW+'px;width:'+trackW+'px">';
  let cur=min, bi=0;
  while(parse(cur)<=parse(max)){
    const[y,m,d]=cur.split('-').map(Number);
    if(d===1||cur===min){
      const x=daysBetween(min,cur)*DAYW;
      const firstNext=addDays(`${y}-${pad(m)}-15`,20).slice(0,7)+'-01';
      const stop=parse(firstNext)<parse(max)?firstNext:addDays(max,1);
      const w=daysBetween(cur,stop)*DAYW;
      if(bi%2===1) bands+=`<div class="band" style="left:${x}px;width:${w}px;background:var(--band)"></div>`;
      bi++;
    }
    cur=addDays(cur,1);
  }
  cur=min;
  while(parse(cur)<=parse(max)){ if(dow(cur)===1){const x=daysBetween(min,cur)*DAYW;bands+=`<div class="wk" style="left:${x}px"></div>`;} cur=addDays(cur,1); }
  bands+='</div>';

  let axis='<div class="axis" style="width:'+(LW+trackW)+'px">';
  cur=min;
  while(parse(cur)<=parse(max)){
    const[y,m,d]=cur.split('-').map(Number);
    const x=LW+daysBetween(min,cur)*DAYW;
    if(d===1||cur===min) axis+=`<div class="mo" style="left:${x}px">${MON[m-1]}${(m===1||cur===min)?" '"+String(y).slice(2):''}</div>`;
    if(dow(cur)===1 && DAYW>=9) axis+=`<div class="wd" style="left:${x}px">${d}</div>`;
    cur=addDays(cur,1);
  }
  axis+='</div>';

  const ti=todayIso();
  const todayX=(parse(ti)>=parse(min)&&parse(ti)<=parse(max))?daysBetween(min,ti)*DAYW:null;
  const todayEl=x=>x===null?'':`<div class="today" style="left:${x}px"><span class="cap">TODAY</span></div>`;

  let lanes='';
  if(!detailed){
    visibleProjects().forEach(p=>{
      const sel=p.id===selId?' sel':'';
      const L=layoutLane(p,min);
      let marks='';
      // roadmap spine across the project's active span
      const spans=[...L.tasks.arr.map(t=>[t.a,t.b]),...L.meets.map(m=>[m.c,m.c]),...L.ddls.map(m=>[m.c,m.c])];
      if(spans.length){
        const ra=Math.min(...spans.map(s=>s[0])), rb=Math.max(...spans.map(s=>s[1]));
        marks+=`<div class="rail" style="left:${ra}px;width:${Math.max(rb-ra,3)}px;top:${L.lineY+6}px;background:${hex2rgba(p.color,.30)}"></div>`;

      const now=currentPhase(p);

      lanes+=`<div class="lane${sel}" data-id="${p.id}" style="height:${L.H}px">

}

/* pack task intervals into sub-rows; meetings+deadlines share one overlaid line */
function packRows(items){
  const arr=items.slice().sort((x,y)=>x.a-y.a); const ends=[];
  arr.forEach(it=>{let r=ends.findIndex(e=>e<=it.a-3);if(r<0){r=ends.length;ends.push(it.b);}else ends[r]=it.b;it.row=r;});
  return {arr,rows:Math.max(ends.length,1)};
}
const TYPE_ORDER=['concept','data','manuscript'];
function layoutLane(p,min){
  const tasks=(p.tasks||[]).filter(t=>t.include).map(t=>({...t,type:'task',a:daysBetween(min,t.start)*DAYW,b:(daysBetween(min,t.end)+1)*DAYW}));
  const meets=(p.meetings||[]).filter(m=>m.include).map(m=>({...m,type:'meeting',c:daysBetween(min,m.date)*DAYW+DAYW/2}));
  const ddls=(p.deadlines||[]).filter(m=>m.include).map(m=>({...m,type:'deadline',c:daysBetween(min,m.date)*DAYW+DAYW/2}));
  // one lane-row per task TYPE that is present, in fixed order
  const present=TYPE_ORDER.filter(tt=>tasks.some(t=>(t.ttype||'concept')===tt));
  const rowOf={}; present.forEach((tt,i)=>rowOf[tt]=i);
  tasks.forEach(t=>{ t.row=rowOf[t.ttype||'concept']; });
  const rows=Math.max(present.length,1);
  const tH=rows*24;
  const lineY=12 + tH + 12;           // milestone line sits BELOW the task-type rows
  const H=lineY + 20;
  return {tasks:{arr:tasks,rows}, meets, ddls, lineY, H, present};
}
function currentPhase(p){
  const ti=todayIso();
  const t=(p.tasks||[]).filter(x=>x.include).find(x=>parse(x.start)<=parse(ti)&&parse(ti)<=parse(x.end));
  return t?t.label.replace(/\s*\(.*\)/,''):'';
}
function renderItemRow(p,it,min,H,clash){
  const x=daysBetween(min,itemStart(it))*DAYW; const nf=it.needs?' needsfill':'';
  if(it.type==='task'){
    const w=Math.max((daysBetween(it.start,it.end)+1)*DAYW,7), bh=18, top=(H-bh)/2, tc=taskColor(p,it);
    const asg=(it.att||[]).some(a=>a.e)?'<span class="asg"></span>':'';
    return `<div class="bar${nf}" data-pid="${p.id}" data-type="task" data-key="${it.key}" data-tip="${tipData(p,it)}" style="left:${x}px;width:${w}px;height:${bh}px;top:${top}px;background:linear-gradient(180deg,${hex2rgba(tc,.24)},${hex2rgba(tc,.14)});color:${tc}"><span class="cap l"></span><span class="grip l"></span>${asg}<span class="grip r"></span><span class="cap r"></span></div>`;
  }
  const c=x+DAYW/2;
  if(it.type==='meeting'){
    const cc=(clash[it.date+'|'+it.time]&&clash[it.date+'|'+it.time].length>1)?' collide':'';
    return `<div class="pin${cc}${nf}" data-pid="${p.id}" data-type="meeting" data-key="${it.key}" data-tip="${tipData(p,it)}" style="left:${c}px;top:${(H-16)/2}px;color:${p.color}"><div class="dot" style="background:${p.color}"></div></div>`;
  }
  return `<div class="flag${nf}" data-pid="${p.id}" data-type="deadline" data-key="${it.key}" data-tip="${tipData(p,it)}" style="left:${c}px;top:${(H-12)/2}px;color:${p.color}"><div class="tri" style="border-top:12px solid ${p.color}"></div></div>`;
}

function tipData(p,it){
  const when=it.type==='task'?`${fmtFull(it.start)} – ${fmtFull(it.end)}`:`${fmtFull(it.date)} · ${it.time}`;
  const kind={meeting:'Meeting',deadline:'Deadline',task:'Work phase'}[it.type];
  return encodeURIComponent(JSON.stringify({t:kind,l:it.label,w:when,tag:p.tag}));
}
function attachTips(scope){
  const tip=el('tip');
  scope.querySelectorAll('[data-tip]').forEach(n=>{
    n.onmousemove=e=>{const d=JSON.parse(decodeURIComponent(n.dataset.tip));
      tip.innerHTML=`<span class="tt">${d.t} · [${d.tag}]</span><br><b>${d.l}</b><br>${d.w}`;
      tip.style.opacity=1;tip.style.left=Math.min(e.clientX+14,innerWidth-260)+'px';tip.style.top=(e.clientY+16)+'px';};
    n.onmouseleave=()=>{tip.style.opacity=0;};
  });
}

function renderUpcoming(){
  const wrap=el('upcomingWrap'); if(!wrap)return;
  const from=todayIso(), to=addDays(from,56);   // 8 weeks

    (p.meetings||[]).filter(m=>m.include).forEach(m=>rows.push({p,type:'meeting',date:m.date,time:m.time,label:m.label,who:(m.asgNote||[]).map(a=>a.n||a.e).filter(Boolean)}));
    (p.deadlines||[]).filter(m=>m.include).forEach(m=>rows.push({p,type:'deadline',date:m.date,time:m.time,label:m.label,who:(m.asgNote||[]).map(a=>a.n||a.e).filter(Boolean)}));

        const when=r.due?`<b>${fmt(r.date)}</b> due`:`<b>${fmt(r.date)}</b> ${r.time}`;
        const tylbl=r.type==='task'?'task':r.type;
        return `<div class="up-row" data-id="${r.p.id}">
          <span class="up-when">${when}<br><span class="${soon}">${rel}</span></span>
          <span class="up-dot" style="background:${r.p.color}"></span>
          <span class="up-type ${ty}">${tylbl}</span>
          <span class="up-lbl">${r.label}${who}</span>
          <span class="up-tag">[${r.p.tag}]</span>
        </div>`;
      }).join('')
    : `<div class="empty">Nothing matches in the next 8 weeks.</div>`;

  wrap.innerHTML=filterBar+list;
  el('upFType').onchange=e=>{upType=e.target.value;renderUpcoming();};
  el('upFProj').onchange=e=>{upProj=e.target.value;renderUpcoming();};
  el('upFName').onchange=e=>{upName=e.target.value;renderUpcoming();};

const VTZ=['BEGIN:VTIMEZONE','TZID:Asia/Kuwait','BEGIN:STANDARD','DTSTART:19700101T000000','TZOFFSETFROM:+0300','TZOFFSETTO:+0300','TZNAME:+03','END:STANDARD','END:VTIMEZONE'];
const esc=s=>String(s).replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
function nowStamp(){const d=new Date();const q=n=>String(n).padStart(2,'0');return `${d.getUTCFullYear()}${q(d.getUTCMonth()+1)}${q(d.getUTCDate())}T${q(d.getUTCHours())}${q(d.getUTCMinutes())}${q(d.getUTCSeconds())}Z`;}
function touch(item){ if(item){ item.rev=(item.rev||0)+1; item.needs=false; } }   // bump version so Outlook re-import updates (not duplicates)
const alarms=()=>['BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:Reminder — 1 week','TRIGGER:-P7D','END:VALARM','BEGIN:VALARM','ACTION:DISPLAY','DESCRIPTION:Reminder — 1 day','TRIGGER:-P1D','END:VALARM'];
const endTime=(t,dur)=>{const[h,m]=t.split(':').map(Number);const tot=h*60+m+dur;return pad(Math.floor(tot/60)%24)+pad(tot%60)};

const attLines=arr=>(arr||[]).filter(m=>m.e).map(m=>`ATTENDEE;CUTYPE=INDIVIDUAL;ROLE=REQ-PARTICIPANT;PARTSTAT=NEEDS-ACTION;RSVP=TRUE;CN="${(m.n||m.e).replace(/"/g,'')}":mailto:${m.e}`);
const taskInvited=t=>(t.att||[]).some(a=>a.e);
function groupPlusOrg(p){
  const out=[]; const seen=new Set();
  const oname=ORGNAME||(ORG?ORG.split('@')[0]:'');
  if(ORG||ORGNAME){ out.push({n:oname||'You (organizer)', e:ORG||'', org:true}); seen.add(ORG||'__org__'); }
  (p.roster||[]).forEach(m=>{ if((m.e||m.n) && !seen.has(m.e)){ out.push({n:m.n,e:m.e}); seen.add(m.e); } });
  return out;
}
const noteNames=it=>(it.asgNote||[]).map(a=>a.n||a.e).filter(Boolean);
function buildEvents(p,kind){
  const out=[];
  const stamp=nowStamp();
  const rosterAtt=attLines(p.roster);
  const org=ORG?`ORGANIZER;CN="${(ORGNAME||ORG.split('@')[0]).replace(/"/g,'')}":mailto:${ORG}`:null;
  let list;
  if(kind==='meetings') list=(p.meetings||[]).map(x=>({...x,type:'meeting'}));
  else if(kind==='deadlines') list=(p.deadlines||[]).map(x=>({...x,type:'deadline'}));
  else{
    list=(p.tasks||[]).map(x=>({...x,type:'task'}));
    if(kind==='tasks_invited') list=list.filter(taskInvited);
    else if(kind==='tasks_private') list=list.filter(t=>!taskInvited(t));
  }
  list.filter(x=>x.include).forEach(it=>{
    const start=it.type==='task'?it.start:it.date;
    const uid=`${p.tag}-${it.key}-${basic(start)}@mkh-portfolio`;
    let ev=['BEGIN:VEVENT',`UID:${uid}`,`DTSTAMP:${stamp}`];
    ev.push(`SUMMARY:[${esc(p.tag)}] ${it.type==='deadline'?'DEADLINE — ':''}${esc(it.label)}`);
    if(it.type==='task'){
      ev.push(`DTSTART;VALUE=DATE:${basic(it.start)}`,`DTEND;VALUE=DATE:${basic(addDays(it.end,1))}`);
    }else{
      const st=it.time.replace(':',''), et=endTime(it.time, it.type==='meeting'?p.dur:30);
      ev.push(`DTSTART;TZID=Asia/Kuwait:${basic(it.date)}T${st}00`,`DTEND;TZID=Asia/Kuwait:${basic(it.date)}T${et}00`);
      ev.push(`LOCATION:${esc(p.location)}`);
    }
    const noteSrc=it.type==='task' ? (it.att||[]) : (it.asgNote||[]);
    const noteNamesList=noteSrc.map(a=>a.n||a.e).filter(Boolean);
    const noteLine=noteNamesList.length ? 'Assigned to: '+noteNamesList.join(', ') : '';
    const descBase=it.desc || (it.type==='task'?it.label:'');
    const fullDesc=[noteLine,descBase].filter(Boolean).join('\n') || it.label;
    ev.push(`CATEGORIES:${esc(p.tag)}`,`DESCRIPTION:${esc(fullDesc)}`);
    ev.push(it.type==='meeting'?'TRANSP:OPAQUE':'TRANSP:TRANSPARENT',`SEQUENCE:${it.rev||0}`,'STATUS:CONFIRMED');
    if(it.type!=='task'){ if(org)ev.push(org); ev.push(...rosterAtt, ...alarms()); }
    else if(taskInvited(it)){ if(org)ev.push(org); ev.push(...attLines(it.att), ...alarms()); }  // assigned task = invited, with reminders
    ev.push('END:VEVENT');
    out.push(ev.join('\r\n'));
  });
  return out;
}
function foldICS(s){return s.split('\r\n').map(l=>{
  if(l.length<=74)return l;
  let out=l.slice(0,74),rest=l.slice(74);
  while(rest.length>73){out+='\r\n '+rest.slice(0,73);rest=rest.slice(73);}
  return out+'\r\n '+rest;
}).join('\r\n');}
function wrap(events,name,method){return foldICS(['BEGIN:VCALENDAR','VERSION:2.0',`PRODID:-//MKH Portfolio Console//${name}//EN`,'CALSCALE:GREGORIAN','METHOD:'+(method||'PUBLISH'),...VTZ,...events,'END:VCALENDAR'].join('\r\n'))}
function buildCancellations(p){
  const stamp=nowStamp();
  return (p.deleted||[]).map(d=>{
    let ev=['BEGIN:VEVENT',`UID:${d.uid}`,`DTSTAMP:${stamp}`,`SEQUENCE:${d.seq||99}`,'STATUS:CANCELLED',`SUMMARY:${esc(d.summary||'Cancelled')}`];
    if(d.timed) ev.push(`DTSTART;TZID=Asia/Kuwait:${basic(d.start)}T${(d.time||'12:00').replace(':','')}00`);
    else ev.push(`DTSTART;VALUE=DATE:${basic(d.start)}`);
    ev.push('END:VEVENT');
    return ev.join('\r\n');
  });
}
function recordDeletion(p,it,type){
  p.deleted=p.deleted||[];
  const start=type==='task'?it.start:it.date;
  p.deleted.push({uid:`${p.tag}-${it.key}-${basic(start)}@mkh-portfolio`, gid:(p.gmap||{})[it.key]||null, key:it.key, summary:`[${p.tag}] ${type==='deadline'?'DEADLINE — ':''}${it.label}`, start, timed:type!=='task', time:it.time||'12:00', seq:(it.rev||0)+5});
  if(p.gmap) delete p.gmap[it.key];
}

/* ---------- ZIP writer (store / no compression, valid .zip) ---------- */
const CRC_TABLE=(()=>{const t=[];for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
function crc32(u8){let crc=0xFFFFFFFF;for(let i=0;i<u8.length;i++)crc=(crc>>>8)^CRC_TABLE[(crc^u8[i])&0xFF];return (crc^0xFFFFFFFF)>>>0;}
function makeZip(files){
  const enc=new TextEncoder();
  const u16=n=>[n&0xFF,(n>>>8)&0xFF];
  const u32=n=>[n&0xFF,(n>>>8)&0xFF,(n>>>16)&0xFF,(n>>>24)&0xFF];
  const parts=[], central=[]; let offset=0;
  files.forEach(f=>{
    const name=enc.encode(f.name), data=enc.encode(f.str), crc=crc32(data);
    const lh=[].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0x21),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0));
    parts.push(new Uint8Array(lh),name,data);
    central.push([].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0x21),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset)));
    central.push(name);
    offset+=lh.length+name.length+data.length;
  });
  const cdParts=[]; let cdSize=0;
  for(let i=0;i<central.length;i+=2){const h=new Uint8Array(central[i]),nm=central[i+1];cdParts.push(h,nm);cdSize+=h.length+nm.length;}
  const eocd=new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(central.length/2),u16(central.length/2),u32(cdSize),u32(offset),u16(0)));
  const all=[...parts,...cdParts,eocd];
  const total=all.reduce((s,a)=>s+a.length,0), out=new Uint8Array(total); let p=0;
  all.forEach(a=>{out.set(a,p);p+=a.length;});
  return out;
}
function downloadZip(bytes,fname){const b=new Blob([bytes],{type:'application/zip'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=fname;a.click();URL.revokeObjectURL(u);}

function projectFiles(p){
  const inv=[...buildEvents(p,'meetings'),...buildEvents(p,'deadlines'),...buildEvents(p,'tasks_invited')];
  const tsk=buildEvents(p,'tasks_private'); const files=[];
  if(inv.length) files.push({name:`${p.tag}/1_INVITED_${p.tag}.ics`,str:wrap(inv,'invited'),n:inv.length,kind:'inv'});
  if(tsk.length) files.push({name:`${p.tag}/2_PRIVATE_${p.tag}.ics`,str:wrap(tsk,'tasks'),n:tsk.length,kind:'priv'});
  if((p.deleted||[]).length) files.push({name:`${p.tag}/3_CANCELLED_${p.tag}.ics`,str:wrap(buildCancellations(p),'cancel','CANCEL'),n:p.deleted.length,kind:'cancel'});
  return files;
}

Ask at most TWO short clarifying questions ONLY if start date, submission date, or the recruitment/data-collection window is missing; otherwise draft directly.

When drafting, reply with ONE short sentence naming the design + guideline, then a fenced json block in EXACTLY this shape (dates YYYY-MM-DD; 24h times; meetDow 0=Sun..6=Sat) and NOTHING after it:
\`\`\`json
{"name":"","tag":"","studyType":"","guideline":"","start":"","submission":"","meetDow":0,"meetTime":"12:00","ddlTime":"12:00","meetings":[["label","date"]],"deadlines":[["label","date"]],"tasks":[["label","start","end"]]}

/* ---------- import changed events back from an .ics ---------- */
function unfold(text){return text.replace(/\r\n/g,'\n').replace(/\n[ \t]/g,'')}
function parseICS(text){
  const out=[]; const blocks=unfold(text).split('BEGIN:VEVENT').slice(1);
  blocks.forEach(b=>{
    const body=b.split('END:VEVENT')[0];
    const get=re=>{const m=body.match(re);return m?m[1].trim():''};
    const uid=get(/\nUID:(.*)/)||get(/^UID:(.*)/);
    const summary=get(/\nSUMMARY:(.*)/).replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\n/g,' ').replace(/\\\\/g,'\\');
    const dts=get(/\nDTSTART[^:]*:(.*)/), dte=get(/\nDTEND[^:]*:(.*)/);
    const allday=/DTSTART;VALUE=DATE/.test(body);
    const toDate=v=>v?`${v.slice(0,4)}-${v.slice(4,6)}-${v.slice(6,8)}`:'';
    const toTime=v=>/T\d{6}/.test(v)?`${v.slice(9,11)}:${v.slice(11,13)}`:'';
    out.push({uid,summary,allday,date:toDate(dts),time:toTime(dts),endDate:toDate(dte),endTime:toTime(dte)});
  });
  return out.filter(e=>e.uid);
}
function findItem(p,uid){
  for(const type of ['meetings','deadlines','tasks']){
    const it=(p[type]||[]).find(x=>`${p.tag}-${x.key}-${basic(type==='tasks'?x.start:x.date)}`+'@mkh-portfolio'===uid || uidOf(p,type,x)===uid);
    if(it)return {type,it};
  }
  return null;
}
function uidOf(p,type,x){return `${p.tag}-${x.key}-${basic(type==='tasks'?x.start:x.date)}@mkh-portfolio`;}
function reconcile(p,events){
  const changes=[];
  events.forEach(ev=>{
    // match by key (ignoring the date part of the UID, which may have moved)
    const key=(ev.uid.split('@')[0]||'').replace(p.tag+'-','').replace(/-\d{8}$/,'');
    let found=null,ftype=null;
    for(const type of ['meetings','deadlines','tasks']){
      const it=(p[type]||[]).find(x=>x.key===key); if(it){found=it;ftype=type;break;}
    }
    if(!found){changes.push({kind:'new',ev});return;}
    const before=ftype==='tasks'?`${found.start} – ${found.end}`:`${found.date} ${found.time}`;
    let after, diff=false;
    if(ftype==='tasks'){
      const ns=ev.date||found.start, ne=ev.allday&&ev.endDate?addDays(ev.endDate,-1):(ev.endDate||found.end);
      after=`${ns} – ${ne}`; diff=(ns!==found.start||ne!==found.end);
      changes.push({kind:'update',type:ftype,it:found,before,after,apply:()=>{found.start=ns;found.end=ne;}});
    }else{
      const nd=ev.date||found.date, nt=ev.time||found.time;
      after=`${nd} ${nt}`; diff=(nd!==found.date||nt!==found.time);
      changes.push({kind:'update',type:ftype,it:found,before,after,apply:()=>{found.date=nd;found.time=nt;}});
    }
    changes[changes.length-1].diff=diff;
  });
  return changes;
}
function showImportDiff(p,changes){
  const updates=changes.filter(c=>c.kind==='update'&&c.diff);
  const same=changes.filter(c=>c.kind==='update'&&!c.diff).length;
  const news=changes.filter(c=>c.kind==='new');
  let html=`<div class="modal-h"><h2>Review changes for [${p.tag}]</h2></div><div class="modal-b">`;
  if(!updates.length&&!news.length){html+=`<div class="empty">Nothing to change — the file matches the console (${same} events identical).</div>`;}
  if(updates.length){html+=`<div class="msec">Changed dates/times (${updates.length})</div>`+
    updates.map((c,i)=>`<div class="pline"><span class="pd">${c.it.label}</span><span style="color:var(--muted)">${c.before}</span> → <span style="color:var(--accent);font-weight:600">${c.after}</span></div>`).join('');}
  if(news.length){html+=`<div class="msec">In the file but not on the console (${news.length})</div>`+
    news.map(c=>`<div class="pline"><span class="pd">unmatched</span>${esc2(c.ev.summary||c.ev.uid)}</div>`).join('')+
    `<div style="font-size:11.5px;color:var(--muted);margin-top:6px">These weren't recognised — likely renamed keys or events created outside the console. Add them manually if needed.</div>`;}
  html+=`</div><div class="modal-f"><button class="btn" id="impCancel">Cancel</button>`+
    (updates.length?`<button class="btn primary" id="impApply">Apply ${updates.length} change${updates.length>1?'s':''}</button>`:'')+`</div>`;
  const ov=el('impOverlay'); ov.querySelector('.modal').innerHTML=html; ov.classList.add('show');
  ov.querySelector('#impCancel').onclick=()=>ov.classList.remove('show');
  const ap=ov.querySelector('#impApply');
  if(ap)ap.onclick=()=>{updates.forEach(c=>c.apply());save();renderAll();ov.classList.remove('show');toast(`Applied ${updates.length} change${updates.length>1?'s':''} from the file`);};
}
function handleICSDrop(p,file){
  const r=new FileReader();
  r.onload=()=>{try{const events=parseICS(r.result);
    if(!events.length){toast('No events found in that file');return;}
    showImportDiff(p,reconcile(p,events));
  }catch(e){toast('Could not read that .ics file');}};
  r.readAsText(file);
}

/* ---------- drag / resize / expand on the timeline ---------- */
function getItem(p,type,key){const arr=type==='meeting'?p.meetings:type==='deadline'?p.deadlines:p.tasks;return {arr,item:(arr||[]).find(x=>x.key===key)};}
let drag=null;
function dragText(d){
  if(d.type!=='task'){ let nd=addDays(d.origDate,d.ddx||0); if(d.type==='meeting') nd=snapDow(nd,d.p.meetDow); return DOWN[dow(nd)]+' '+fmt(nd)+(d.type==='meeting'?' (snaps to '+DOWN[d.p.meetDow]+')':''); }
  if(d.mode==='move'){ const cur=TYPE_ORDER.indexOf(d.origType||'concept'); const nt=(d.ddy)?' → '+TASK_TYPES[TYPE_ORDER[Math.max(0,Math.min(2,cur+d.ddy))]].short:''; return fmt(addDays(d.origStart,d.ddx||0))+' – '+fmt(addDays(d.origEnd,d.ddx||0))+nt; }
  if(d.mode==='resizeL'){ let s=addDays(d.origStart,d.ddx||0); if(parse(s)>parse(d.origEnd)) s=d.origEnd; return 'start '+DOWN[dow(s)]+' '+fmt(s); }
  let en=addDays(d.origEnd,d.ddx||0); if(parse(en)<parse(d.origStart)) en=d.origStart; return 'end '+DOWN[dow(en)]+' '+fmt(en);
}
function ganttPointerDown(e){
  const node=e.target.closest('[data-key]');
  if(!node){ closePopover(); return; }
  const p=PROJECTS.find(x=>x.id===node.dataset.pid); if(!p) return;
  if(p.locked){ toast('🔒 Unlock the project to move events'); return; }
  const type=node.dataset.type, key=node.dataset.key, {item}=getItem(p,type,key); if(!item) return;
  const grip=e.target.closest('.grip');
  let mode='move';
  if(type==='task'&&grip) mode=grip.classList.contains('l')?'resizeL':'resizeR';
  const origTop=parseFloat(node.style.top)||0;
  drag={p,type,key,node,mode,startX:e.clientX,startY:e.clientY,moved:0,ddx:0,ddy:0,
    origLeft:parseFloat(node.style.left)||0, origWidth:parseFloat(node.style.width)||0, origTop,
    origRow:Math.max(0,Math.round((origTop-12)/24)), origType:item.ttype||'concept',
    origDate:item.date, origStart:item.start, origEnd:item.end};
  node.classList.add('dragging');
  el('tip').style.opacity=0;
  try{node.setPointerCapture(e.pointerId);}catch(_){}
  e.preventDefault(); e.stopPropagation();
  window.addEventListener('pointermove',ganttPointerMove);
  window.addEventListener('pointerup',ganttPointerUp);
}
function ganttPointerMove(e){
  if(!drag) return;
  const dx=e.clientX-drag.startX, dy=e.clientY-drag.startY;
  drag.moved=Math.max(drag.moved,Math.abs(dx),Math.abs(dy));
  drag.ddx=Math.round(dx/DAYW);
  drag.ddy=(drag.type==='task'&&drag.mode==='move')?Math.round(dy/24):0;
  const n=drag.node, L=drag.origLeft, W=drag.origWidth, off=drag.ddx*DAYW;
  if(drag.type==='task'){
    if(drag.mode==='move'){ n.style.left=(L+off)+'px'; n.style.top=(drag.origTop+drag.ddy*24)+'px'; }
    else if(drag.mode==='resizeL'){ const w=Math.max(W-off,DAYW); n.style.left=(L+(W-w))+'px'; n.style.width=w+'px'; }
    else { n.style.width=Math.max(W+off,DAYW)+'px'; }
  }else{ n.style.left=(L+off)+'px'; }
  const lbl=el('dragLbl'); lbl.textContent=dragText(drag); lbl.classList.add('show');
  lbl.style.left=Math.min(e.clientX+14,innerWidth-190)+'px'; lbl.style.top=(e.clientY-30)+'px';
}
function ganttPointerUp(e){
  window.removeEventListener('pointermove',ganttPointerMove);
  window.removeEventListener('pointerup',ganttPointerUp);
  el('dragLbl').classList.remove('show');
  const d=drag; drag=null; if(!d) return;
  if(d.node) d.node.classList.remove('dragging');
  if(d.moved<4){ selId=d.p.id; renderDetail(); openEventPopover(d.p,d.type,d.key,e.clientX,e.clientY); return; }
  const ddx=d.ddx||0, ddy=(d.type==='task'&&d.mode==='move')?(d.ddy||0):0;
  const {item}=getItem(d.p,d.type,d.key);
  if(item && (ddx!==0||ddy!==0)){
    if(d.type==='task'){
      if(d.mode==='move'){
        if(ddx){ item.start=addDays(d.origStart,ddx); item.end=addDays(d.origEnd,ddx); }
        if(ddy){ const cur=TYPE_ORDER.indexOf(item.ttype||'concept'); item.ttype=TYPE_ORDER[Math.max(0,Math.min(2,cur+ddy))]; }  // vertical = change type
      }
      else if(d.mode==='resizeL'){ item.start=addDays(d.origStart,ddx); if(parse(item.start)>parse(item.end)) item.start=item.end; }
      else { item.end=addDays(d.origEnd,ddx); if(parse(item.end)<parse(item.start)) item.end=item.start; }
    }else{
      let nd=addDays(d.origDate,ddx);
      if(d.type==='meeting') nd=snapDow(nd,d.p.meetDow);
      item.date=nd;
    }
    item.needs=false; touch(item); selId=d.p.id; save();
  }
  renderAll();
}
function closePopover(){ const p=el('eventPop'); if(p) p.classList.remove('show'); }
function openEventPopover(p,type,key,cx,cy){
  const {item}=getItem(p,type,key); if(!item) return;
  const pop=el('eventPop'); const tyc=type==='meeting'?'tt-meeting':type==='deadline'?'tt-deadline':'tt-task';
  const body=type==='task'
    ? `<div class="fld"><label>Type</label><select id="epType">${Object.entries(TASK_TYPES).map(([k,v])=>`<option value="${k}" ${((item.ttype||'concept')===k)?'selected':''}>${v.label}</option>`).join('')}</select></div>
       <div class="fld"><label>Start</label><input type="date" id="epS" value="${item.start}"><span class="wd-in">${DOWN[dow(item.start)]}</span></div>
       <div class="fld"><label>End</label><input type="date" id="epE" value="${item.end}"><span class="wd-in">${DOWN[dow(item.end)]}</span></div>
       <div class="fld"><label>Assign people (from the Project Group) — invited to this task; empty = private to you</label><div id="epAtt"></div></div>`
    : `<div class="fld"><label>Date</label><input type="date" id="epD" value="${item.date}"><span class="wd-in">${DOWN[dow(item.date)]}</span></div>
       <div class="fld"><label>Time</label><input type="time" id="epT" value="${item.time}"></div>
       <div class="fld"><label>Assigned to — shown as a note (everyone in the group is still invited)</label><div id="epNoteBox"></div></div>`;
  pop.innerHTML=`<div class="eh"><span class="sw" style="background:${p.color}"></span><span class="ty ${tyc}">${type}</span><b style="font-size:12.5px">[${p.tag}]</b></div>
    <div class="eb"><div class="fld"><label>Title</label><input type="text" id="epL" value="${(item.label||'').replace(/"/g,'&quot;')}"></div>${body}</div>
    <div class="ef"><span style="font-size:11px;color:var(--muted)" id="epNote"></span><button class="btn primary sm" id="epClose">Done</button></div>`;
  pop.style.left=Math.min(cx,innerWidth-292)+'px';
  pop.style.top=Math.max(8,Math.min(cy+12,innerHeight-320))+'px';
  pop.classList.add('show');
  const upd=()=>{ touch(item); save(); renderGantt(); renderUpcoming(); renderDetail(); };
  el('epL').onchange=e=>{item.label=e.target.value;upd();};
  const note=el('epNote');
  if(type==='task'){
    el('epType').onchange=e=>{item.ttype=e.target.value;upd();};
    el('epS').onchange=e=>{item.start=e.target.value;if(parse(item.end)<parse(item.start))item.end=item.start;upd();openEventPopover(p,type,key,cx,cy);};
    el('epE').onchange=e=>{item.end=e.target.value;if(parse(item.end)<parse(item.start))item.end=item.start;upd();openEventPopover(p,type,key,cx,cy);};
    item.att=item.att||[];
    const drawAtt=()=>{
      const group=groupPlusOrg(p).filter(m=>m.e);
      const inAtt=e=>item.att.some(a=>a.e===e);
      let html='';
      if(group.length){
        html+=`<div style="font-size:10.5px;color:var(--muted);margin:2px 0 5px">Tick who owns this task (you can pick yourself):</div>`;
        html+=group.map(m=>`<label class="chkrow"><input type="checkbox" data-ge="${m.e}" ${inAtt(m.e)?'checked':''}><span>${(m.n||m.e)}${m.org?' — you':''}</span></label>`).join('');
      }else{
        html+=`<div style="font-size:11px;color:var(--muted)">No one in the Project Group yet — add people in the project settings, or add someone below.</div>`;
      }
      item.att.forEach((a,i)=>{ if(group.some(m=>m.e===a.e))return;   // custom people (not in group)
        html+=`<div class="roster-row" style="margin-top:6px">
          <input type="text" placeholder="Name" value="${(a.n||'').replace(/"/g,'&quot;')}" data-ai="${i}" data-f="n">
          <input type="text" placeholder="email" value="${(a.e||'').replace(/"/g,'&quot;')}" data-ai="${i}" data-f="e">
          <button class="btn ghost sm" data-adel="${i}">✕</button></div>`;
      });
      html+=`<button class="btn sm" id="epAddCustom" style="margin-top:7px">+ Someone not in the group</button>`;
      el('epAtt').innerHTML=html;
      el('epAtt').querySelectorAll('[data-ge]').forEach(cb=>cb.onchange=()=>{
        const em=cb.dataset.ge, gm=group.find(m=>m.e===em);
        if(cb.checked){ if(!inAtt(em)) item.att.push({n:gm.n,e:gm.e}); }
        else { const i=item.att.findIndex(a=>a.e===em); if(i>=0) item.att.splice(i,1); }
        upd(); setNote();
      });
      el('epAtt').querySelectorAll('[data-ai]').forEach(inp=>inp.onchange=()=>{item.att[+inp.dataset.ai][inp.dataset.f]=inp.value.trim();upd();setNote();});
      el('epAtt').querySelectorAll('[data-adel]').forEach(b=>b.onclick=()=>{item.att.splice(+b.dataset.adel,1);upd();drawAtt();setNote();});
      el('epAddCustom').onclick=()=>{item.att.push({n:'',e:''});drawAtt();setNote();};
    };
    const setNote=()=>{ const n=item.att.filter(a=>a.e).length; note.textContent=n?`→ invited (${n} on their calendars)`:'→ private to you'; };
    drawAtt(); setNote();
  }else{
    el('epD').onchange=e=>{item.date=e.target.value;upd();openEventPopover(p,type,key,cx,cy);};
    el('epT').onchange=e=>{item.time=e.target.value;upd();};
    item.asgNote=item.asgNote||[];
    const people=groupPlusOrg(p);
    const keyOf=m=>m.e||('n:'+(m.n||''));
    const has=k=>item.asgNote.some(a=>keyOf(a)===k);
    const drawNote=()=>{
      el('epNoteBox').innerHTML=people.length
        ? people.map(m=>`<label class="chkrow"><input type="checkbox" data-ak="${keyOf(m)}" ${has(keyOf(m))?'checked':''}><span>${(m.n||m.e)}${m.org?' — you':''}</span></label>`).join('')
        : '<div style="font-size:11px;color:var(--muted)">Add people (or your organizer name) in project settings to assign.</div>';
      el('epNoteBox').querySelectorAll('[data-ak]').forEach(cb=>cb.onchange=()=>{
        const k=cb.dataset.ak, m=people.find(x=>keyOf(x)===k);
        if(cb.checked){ if(!has(k)) item.asgNote.push({n:m.n,e:m.e}); }
        else { const i=item.asgNote.findIndex(a=>keyOf(a)===k); if(i>=0) item.asgNote.splice(i,1); }
        upd(); setNoteLbl();
      });
    };
    const setNoteLbl=()=>{ const nm=noteNames(item); note.textContent=nm.length?('Assigned to: '+nm.join(', ')+' · group still invited'):'invited to the whole Project Group'; };
    drawNote(); setNoteLbl();
  }
  el('epClose').onclick=closePopover;
}
el('gantt').addEventListener('pointerdown',ganttPointerDown);

/* =================== GOOGLE CALENDAR LAYER =================== */
let gReady=false, gToken=null, gEmail='', gCals=[], tokenClient=null;
const CLIENT_KEY='rp_gclient_id';
function clientId(){ try{return localStorage.getItem(CLIENT_KEY)||'';}catch(e){return '';} }
function setClientId(v){ try{localStorage.setItem(CLIENT_KEY,v);}catch(e){} }

function gInitWhenLoaded(){
  const t=setInterval(()=>{
    if(window.gapi && window.google && google.accounts){
      clearInterval(t);
      gapi.load('client',async()=>{
        await gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest']});
        gReady=true; renderAuth();
      });
    }
  },300);
  setTimeout(()=>clearInterval(t),20000);
}
function renderAuth(){
  const a=el('gAuth'); if(!a)return;
  if(!clientId()){
    a.innerHTML=`<button class="btn sm" id="gSetup">🔗 Connect Google</button>`;
    el('gSetup').onclick=()=>{
      const v=prompt('Paste your Google OAuth Client ID (ends in .apps.googleusercontent.com).\nOne-time setup — see README_SETUP for the 7-minute guide.');
      if(v&&/apps\.googleusercontent\.com/.test(v.trim())){ setClientId(v.trim()); renderAuth(); toast('Client ID saved — now sign in'); }
      else if(v) toast('That does not look like a Client ID');
    };
    return;
  }
  if(!gToken){
    a.innerHTML=`<button class="btn primary sm" id="gSignIn" ${gReady?'':'disabled'}>Sign in with Google</button>`;
    el('gSignIn').onclick=()=>{
      tokenClient=tokenClient||google.accounts.oauth2.initTokenClient({
        client_id:clientId(),
        scope:'https://www.googleapis.com/auth/calendar',
        callback:async r=>{
          if(r&&r.access_token){ gToken=r.access_token; gapi.client.setToken({access_token:gToken});
            await afterSignIn(); }
        }
      });
      tokenClient.requestAccessToken();
    };
    return;
  }
  a.innerHTML=`<span class="pill ok" style="gap:6px">☁ ${gEmail||'connected'}</span>`;
}
async function afterSignIn(){
  try{
    const cl=await gapi.client.calendar.calendarList.list({minAccessRole:'writer',maxResults:250});
    gCals=(cl.result.items||[]).map(c=>({id:c.id,name:c.summary,primary:!!c.primary}));
    const prim=gCals.find(c=>c.primary); gEmail=prim?prim.id:'';
  }catch(e){ toast('Could not load calendars: '+gErr(e)); }
  renderAuth(); renderProjects();
}
const gErr=e=>(e&&e.result&&e.result.error&&e.result.error.message)||(e&&e.message)||'unknown error';

async function gNewCalendar(p){
  const name=prompt('Name for the new Google calendar:',`Research ${p.tag}`);
  if(!name)return null;
  try{
    const r=await gapi.client.calendar.calendars.insert({summary:name,timeZone:'Asia/Kuwait'});
    const c={id:r.result.id,name:r.result.summary,primary:false};
    gCals.push(c); toast(`Calendar “${name}” created`);
    return c.id;
  }catch(e){ toast('Create failed: '+gErr(e)); return null; }
}

/* Build a Google event resource from a console item — mirrors buildEvents rules */
function buildGEvent(p,it,type){
  const invited = type!=='task' || taskInvited(it);
  const noteSrc = type==='task' ? (it.att||[]) : (it.asgNote||[]);
  const names=noteSrc.map(a=>a.n||a.e).filter(Boolean);
  const noteLine=names.length?'Assigned to: '+names.join(', '):'';
  const descBase=it.desc||(type==='task'?it.label:'');
  const description=[noteLine,descBase].filter(Boolean).join('\n')||it.label;
  const ev={
    summary:`[${p.tag}] ${type==='deadline'?'DEADLINE — ':''}${it.label}`,
    description,
    transparency:type==='meeting'?'opaque':'transparent',
    reminders: invited ? {useDefault:false,overrides:[{method:'popup',minutes:10080},{method:'popup',minutes:1440}]} : {useDefault:true}
  };
  if(type==='task'){
    ev.start={date:it.start}; ev.end={date:addDays(it.end,1)};
  }else{
    const dur=type==='meeting'?p.dur:30;
    const [h,m]=it.time.split(':').map(Number); const tot=h*60+m+dur;
    const endT=pad(Math.floor(tot/60)%24)+':'+pad(tot%60);
    ev.start={dateTime:`${it.date}T${it.time}:00`,timeZone:'Asia/Kuwait'};
    ev.end={dateTime:`${it.date}T${endT}:00`,timeZone:'Asia/Kuwait'};
    ev.location=p.location||'';
  }
  if(invited){
    const ppl = type==='task' ? (it.att||[]) : (p.roster||[]);
    const seen=new Set(); const att=[];
    ppl.filter(a=>a.e).forEach(a=>{ if(!seen.has(a.e)){ att.push({email:a.e,displayName:a.n||undefined}); seen.add(a.e);} });
    if(ORG && !seen.has(ORG)) att.push({email:ORG,displayName:ORGNAME||undefined});   // your Outlook stays current
    if(att.length) ev.attendees=att;
  }
  return ev;
}
function gPlan(p){   // list of operations to sync this project
  const ops=[];
  const push=(it,type)=>{ if(!it.include)return; ops.push({kind:(p.gmap||{})[it.key]?'update':'insert', key:it.key, type, ev:buildGEvent(p,it,type)}); };
  (p.meetings||[]).forEach(m=>push(m,'meeting'));
  (p.deadlines||[]).forEach(d=>push(d,'deadline'));
  (p.tasks||[]).forEach(t=>push(t,'task'));
  (p.deleted||[]).filter(d=>d.gid).forEach(d=>ops.push({kind:'delete',gid:d.gid,key:d.key}));
  return ops;
}
async function gPush(p){
  if(!gToken){ toast('Sign in with Google first'); return; }
  if(!p.gcalId){ toast('Choose a calendar for this project first'); return; }
  if(!p.locked){ toast('🔒 Lock the project, then push'); return; }
  p.gmap=p.gmap||{};
  const ops=gPlan(p);
  if(!ops.length){ toast('Nothing to push'); return; }
  const hint=el('pushHint'); let done=0,fail=0;
  for(const op of ops){
    if(hint) hint.textContent=`Syncing ${++done + fail}/${ops.length}…`;
    try{
      if(op.kind==='insert'){
        const r=await gapi.client.calendar.events.insert({calendarId:p.gcalId,sendUpdates:'all',resource:op.ev});
        p.gmap[op.key]=r.result.id;
      }else if(op.kind==='update'){
        await gapi.client.calendar.events.patch({calendarId:p.gcalId,eventId:p.gmap[op.key],sendUpdates:'all',resource:op.ev});
      }else{
        try{ await gapi.client.calendar.events.delete({calendarId:p.gcalId,eventId:op.gid,sendUpdates:'all'}); }
        catch(e){ const c=e&&e.status; if(c!==404&&c!==410) throw e; }   // already gone = fine
      }
    }catch(e){
      if(op.kind==='update' && (e.status===404||e.status===410)){   // mapping stale -> recreate
        try{ const r=await gapi.client.calendar.events.insert({calendarId:p.gcalId,sendUpdates:'all',resource:op.ev}); p.gmap[op.key]=r.result.id; }
        catch(e2){ fail++; done--; }
      } else { fail++; done--; }
    }
  }
  p.deleted=(p.deleted||[]).filter(d=>!d.gid);   // pushed deletions are done
  save();
  if(hint) hint.textContent='';
  toast(fail?`Synced with ${fail} error(s) — try again or check sign-in`:`☁ ${p.tag}: ${done} events synced — invites & updates sent automatically`);
  renderProjects();
}

/* ---- per-calendar sharing (ACL) ---- */
async function renderShare(p){
  const w=el('shareWrap'); if(!w)return;
  if(!gToken||!p.gcalId){ w.innerHTML='<div style="font-size:11.5px;color:var(--muted)">Sign in and choose a calendar to manage sharing.</div>'; return; }
  let rules=[];
  try{ const r=await gapi.client.calendar.acl.list({calendarId:p.gcalId}); rules=(r.result.items||[]).filter(x=>x.scope&&x.scope.type==='user'&&x.scope.value!==gEmail); }
  catch(e){ w.innerHTML=`<div style="font-size:11.5px;color:var(--warn)">Cannot manage sharing on this calendar (${gErr(e)})</div>`; return; }
  const roleLbl={reader:'sees events',writer:'can edit',owner:'owner'};
  w.innerHTML=`
    ${rules.length?rules.map(r=>`<div class="share-row"><span>${r.scope.value}</span><span class="pill" style="padding:2px 8px;background:var(--line2);color:var(--muted)">${roleLbl[r.role]||r.role}</span><button class="btn ghost sm" data-unshare="${r.id}">✕</button></div>`).join(''):'<div style="font-size:11.5px;color:var(--muted)">Not shared with anyone yet.</div>'}
    <div class="share-add">
      <input type="text" id="shareEmail" placeholder="their@gmail.com / Google account">
      <select id="shareRole"><option value="reader">Can see events</option><option value="writer">Can edit events</option></select>
      <button class="btn sm" id="shareAdd">Share</button>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:5px">Sharing applies to <b>this calendar only</b> — your other calendars stay private. Different calendars can be shared with different people.</div>`;
  el('shareAdd').onclick=async()=>{
    const em=el('shareEmail').value.trim(), role=el('shareRole').value;
    if(!/.+@.+\..+/.test(em)){ toast('Enter a valid email'); return; }
    try{ await gapi.client.calendar.acl.insert({calendarId:p.gcalId,sendNotifications:true,resource:{role,scope:{type:'user',value:em}}});
      toast(`Shared with ${em}`); renderShare(p); }
    catch(e){ toast('Share failed: '+gErr(e)); }
  };
  w.querySelectorAll('[data-unshare]').forEach(b=>b.onclick=async()=>{
    try{ await gapi.client.calendar.acl.delete({calendarId:p.gcalId,ruleId:b.dataset.unshare}); toast('Access removed'); renderShare(p); }
    catch(e){ toast('Remove failed: '+gErr(e)); }
  });
}
function wireGcalControls(p){
  const sel=el('fGcal'); if(!sel) return;
  sel.innerHTML='<option value="">— choose a calendar —</option>'+gCals.map(c=>`<option value="${c.id}" ${p.gcalId===c.id?'selected':''}>${c.name}${c.primary?' (main)':''}</option>`).join('');
  sel.disabled=!gToken;
  sel.onchange=e=>{ p.gcalId=e.target.value; save(); renderShare(p); };
  el('newGcal').disabled=!gToken;
  el('newGcal').onclick=async()=>{ const id=await gNewCalendar(p); if(id){ p.gcalId=id; save(); wireGcalControls(p); renderShare(p); } };
  const pb=el('pushGcal');
  pb.disabled=!(gToken&&p.gcalId&&p.locked);
  pb.onclick=()=>gPush(p);
  const ph=el('pushHint');
  if(ph&&!ph.textContent) ph.textContent = !gToken?'Sign in with Google (top bar) to enable.':!p.gcalId?'Choose or create a calendar above.':!p.locked?'🔒 Lock the project, then push. Invites, updates & deletions all send automatically.':'Ready — pushes creates/updates/deletions; attendees are notified automatically.';
  renderShare(p);
}
gInitWhenLoaded();
